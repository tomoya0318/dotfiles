# --- prefix を Ctrl-a に変更（Ctrl-a Ctrl-a で本来の行頭移動を送れる） ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- 色（Ghostty truecolor） ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
# passthrough = 内側アプリ→外側端末へエスケープを中継する経路（Kitty graphics 等の
# 画像プロトコルに必要）。md-render の画像表示や各種 TUI の icat 系プレビューを tmux 内で
# 使うため on にする。
# 代償: 起動直後にまれに外側端末の XTVERSION 応答が picker 入力へ漏れる
# （snacks に "…ghostty <version>" が一瞬混入）。nvim 起動時の一発で、同一セッション内では
# 再発しない cosmetic な症状（Ctrl-u で消して打ち直せば済む）。画像表示を優先して on で運用する。
# どうしても気になる場合は nvim 側で「起動直後の typeahead を捨てる guard」を足して握りつぶす。
set -g allow-passthrough on

# --- 基本動作 ---
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
# 端末のフォーカスイベントを中のアプリへ転送する。
# これがないと別ペイン/ウィンドウから nvim に戻っても FocusGained が発火せず、
# 外部（Claude Code 等）が編集したファイルが autoread で自動リロードされない。
set -g focus-events on

# --- 修飾キー（Shift+Enter 等を中のアプリへ通す: Claude Code 等） ---
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm-ghostty:extkeys'

# --- 番号は 1 始まり・閉じたら詰める ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- ウィンドウ名の自動命名（Claude Code はプロセス名がバージョン文字列に
#     なるため、semver パターンを検出して "claude" に置き換える） ---
set -g automatic-rename on
set -g automatic-rename-format "#{?#{m/r:^[0-9]+\\.[0-9]+\\.[0-9]+,#{pane_current_command}},claude,#{pane_current_command}}"

# --- コピー（vi 操作・Mac クリップボード連携） ---
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- コピーモードのマウスホイールを滑らかに ---
# デフォルトは1ノッチで数行ジャンプし、ghostty の mouse-scroll-multiplier も
# 掛かってカクつくため、1ノッチ=1行に固定する（物足りなければ -N2 等に）。
bind -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N1 -X scroll-down

# --- 全画面アプリ(nvim 等)のホイールをスクロールキーに変換 ---
# nvim を mouse=on にしていると、tmux はホイールを生マウスイベントとして転送し
# nvim が複数行の「領域スクロール」を行う。これが markview の virtual line と
# 相性が悪く、tmux 越しの再描画で残像が出る。
# そこで alternate screen のアプリ(nvim/less 等)には ↑/↓ キーを送り、
# アプリ自身の通常スクロール経路で描き直させる（残像を大幅に低減）。
# ※ C-e/C-y は挿入モード中のホイールで文字が混入する地雷があるため
#   全モードで安全な矢印キーにしている。
# nvim のクリック・選択(send -M)はそのまま使える。
# シェル等(非 alternate)は従来どおり copy-mode でスクロールバックを見る。
bind -n WheelUpPane   if -F "#{alternate_on}" "send -N3 Up" "copy-mode -e"
bind -n WheelDownPane if -F "#{alternate_on}" "send -N3 Down" "send -M"

# --- 分割・新規ウィンドウは現在の cwd で開く ---
bind c   new-window      -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# --- ペイン移動（vim 風 hjkl） ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- ペインのリサイズ（prefix 後 H/J/K/L を連打可） ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- 直感的な分割キー（| 横並び / - 上下、cwd 継承） ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- ステータスバー（TokyoNight 配色） ---
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-left  "#{?client_prefix,#[fg=#1a1b26#,bg=#e0af68#,bold] PREFIX #[default],}#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#565f89] %H:%M "
set -g window-status-current-style "fg=#7aa2f7,bold"
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# --- 設定リロード ---
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# --- ヘルプ（日本語チートシートをポップアップ表示） ---
bind ? display-popup -w 70% -h 80% -E "less --mouse ~/.config/tmux/cheatsheet-ja.txt"

# --- プロジェクト切替（fzf sessionizer） ---
bind f display-popup -E -w 70% -h 70% "~/.local/bin/tmux-sessionizer"
